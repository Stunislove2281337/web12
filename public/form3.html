<!DOCTYPE html>
<html lang="uk">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Форма 3 — Прапорці</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:rgba(255,255,255,.07);
  --accent:#e8c547;--accent2:#4f9eff;--accent3:#ff5f5f;--text:#f0f0f0;--muted:#6b6b80;
  --fd:"Playfair Display",serif;--fb:"DM Sans",sans-serif;--fm:"DM Mono",monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;padding:24px;line-height:1.6;}
h1{font-family:var(--fd);color:var(--accent);font-size:1.6rem;margin-bottom:8px;}
.subtitle{color:var(--muted);font-size:.85rem;margin-bottom:28px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:600px;margin-bottom:20px;}
.card-title{font-family:var(--fm);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
label{font-size:.85rem;color:var(--text);display:block;margin-bottom:6px;}
.inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;color:var(--text);font-family:var(--fb);font-size:.85rem;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--accent);}
.btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:9px 22px;
  font-weight:600;cursor:pointer;font-size:.85rem;transition:opacity .2s;margin-top:10px;}
.btn:hover:not(:disabled){opacity:.85;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.msg{font-size:.78rem;margin-top:8px;min-height:18px;}
.msg-ok{color:#4caf82;} .msg-err{color:#ff5f5f;} .msg-warn{color:#e8c547;}
.sel{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:8px 10px;color:var(--text);font-family:var(--fb);font-size:.85rem;outline:none;cursor:pointer;}
.sel:focus{border-color:var(--accent);}
.back{display:inline-block;font-family:var(--fm);font-size:.72rem;color:var(--muted);
  text-decoration:none;margin-bottom:20px;letter-spacing:.06em;}
.back:hover{color:var(--accent);}
</style>

<style>
.cb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:var(--surface2);border-radius:8px;border:1px solid var(--border);
  cursor:pointer;transition:border-color .2s;}
.cb-item:has(input:checked){border-color:var(--accent);}
.cb-item input{accent-color:var(--accent);width:16px;height:16px;cursor:pointer;}
.cb-item span{font-size:.83rem;color:var(--text);}
.counter{font-family:var(--fm);font-size:.78rem;color:var(--muted);margin-top:12px;}
.counter strong{color:var(--accent);}
</style>
</head>
<body>
<a class="back" href="index.html">← Повернутись на головну</a>
<h1>Форма 3</h1>
<p class="subtitle">Виберіть щонайменше 5 тем для стрічки новин</p>

<div class="card">
  <div class="card-title">☑ Налаштування стрічки</div>
  <div class="cb-grid" id="cb-grid">
    <label class="cb-item"><input type="checkbox" onchange="onCbChange()"><span>🖥 Технології</span></label>
    <label class="cb-item"><input type="checkbox" onchange="onCbChange()"><span>🔬 Наука</span></label>
    <label class="cb-item"><input type="checkbox" onchange="onCbChange()"><span>🌍 Світові новини</span></label>
    <label class="cb-item"><input type="checkbox" onchange="onCbChange()"><span>📊 Аналітика</span></label>
    <label class="cb-item"><input type="checkbox" onchange="onCbChange()"><span>⚽ Спорт</span></label>
    <label class="cb-item"><input type="checkbox" onchange="onCbChange()"><span>🎭 Культура</span></label>
    <label class="cb-item"><input type="checkbox" onchange="onCbChange()"><span>💰 Економіка</span></label>
    <label class="cb-item"><input type="checkbox" onchange="onCbChange()"><span>🏥 Здоров'я</span></label>
    <label class="cb-item"><input type="checkbox" onchange="onCbChange()"><span>🌱 Екологія</span></label>
    <label class="cb-item"><input type="checkbox" onchange="onCbChange()"><span>🎮 Розваги</span></label>
  </div>
  <div class="counter">Вибрано: <strong id="cb-count">0</strong> / 10</div>
  <div class="msg" id="cb-msg"></div>
  <button class="btn" id="cb-save" disabled onclick="saveCb()">Зберегти налаштування</button>
</div>

<script>
function onCbChange() {
  const all = document.querySelectorAll('#cb-grid input[type=checkbox]');
  const checked = [...all].filter(c=>c.checked).length;
  document.getElementById('cb-count').textContent = checked;
  const msg = document.getElementById('cb-msg');
  const btn = document.getElementById('cb-save');
  if (checked < 5) {
    msg.className = 'msg msg-err';
    msg.textContent = '⚠ Вибрано замало тем — оберіть щонайменше 5 (зараз ' + checked + ')';
    btn.disabled = true;
  } else {
    msg.className = 'msg msg-ok';
    msg.textContent = '✓ Чудово! Обрано ' + checked + ' тем';
    btn.disabled = false;
  }
}
function saveCb() {
  const msg = document.getElementById('cb-msg');
  msg.className = 'msg msg-ok';
  msg.textContent = '✅ Налаштування збережено!';
}
</script>
</body></html>
